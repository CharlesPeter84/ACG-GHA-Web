- name: Install nginx
  ansible.builtin.yum:
    name: nginx
    state: present

- name: Ensure webroot directory exists
  ansible.builtin.file:
    path: "{{ nginx_webroot }}"
    state: directory
    owner: nginx
    group: nginx
    mode: '0755'

- name: Deploy nginx site configuration
  ansible.builtin.template:
    src: default.conf.j2
    dest: /etc/nginx/conf.d/default.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart nginx

- name: Copy website files to webroot
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../web/{{ item }}"
    dest: "{{ nginx_webroot }}/{{ item }}"
    owner: nginx
    group: nginx
    mode: '0644'
  loop:
    - index.html
    - about.html
    - style.css
  notify: Restart nginx
