name: Deploy EC2 via Terraform

on:
  push:
    branches: [ main ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Verify Terraform DynamoDB lock table schema
        run: |
          aws dynamodb describe-table --table-name "${{ secrets.TF_DYNAMODB_TABLE }}" > /tmp/dynamodb-table.json
          python3 - <<'PY'
          import json, sys
          data = json.load(open('/tmp/dynamodb-table.json'))
          key_schema = data.get('Table', {}).get('KeySchema', [])
          if key_schema != [{'AttributeName': 'LockID', 'KeyType': 'HASH'}]:
              print('Error: expected DynamoDB lock table key schema to be LockID HASH')
              print('Found:', key_schema)
              sys.exit(1)
          attr_defs = data.get('Table', {}).get('AttributeDefinitions', [])
          if not any(a.get('AttributeName') == 'LockID' and a.get('AttributeType') == 'S' for a in attr_defs):
              print('Error: expected DynamoDB attribute definition LockID of type S')
              print('Found:', attr_defs)
              sys.exit(1)
          print('Terraform lock table schema is valid')
          PY

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_S3_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_DYNAMODB_TABLE }}"

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -input=false -auto-approve tfplan
