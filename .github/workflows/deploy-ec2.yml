name: Deploy EC2 via Terraform

on:
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
      - 'ansible/**'
      - 'web/**'
      - '.github/workflows/deploy-ec2.yml'

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_ssh_public_key }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Detect changed paths
        id: changed-paths
        uses: dorny/paths-filter@v4
        with:
          filters: |
            ansible:
              - 'ansible/**'
              - 'web/**'
            terraform:
              - 'terraform/**'

      - name: Verify Terraform DynamoDB lock table schema
        run: |
          LOCK_KEY=$(aws dynamodb describe-table --table-name "${{ secrets.TF_DYNAMODB_TABLE }}" --query 'Table.KeySchema[0].AttributeName' --output text)
          if [ "$LOCK_KEY" != "LockID" ]; then
            echo "Error: DynamoDB lock table must use 'LockID' as the hash key."
            echo "Found: '$LOCK_KEY'"
            echo ""
            echo "To fix, delete and recreate the table:"
            echo "  aws dynamodb delete-table --table-name ${{ secrets.TF_DYNAMODB_TABLE }}"
            echo "  aws dynamodb wait table-not-exists --table-name ${{ secrets.TF_DYNAMODB_TABLE }}"
            echo "  aws dynamodb create-table --table-name ${{ secrets.TF_DYNAMODB_TABLE }} --attribute-definitions AttributeName=LockID,AttributeType=S --key-schema AttributeName=LockID,KeyType=HASH --billing-mode PAY_PER_REQUEST"
            exit 1
          fi
          echo "DynamoDB lock table schema is valid (LockID key found)"

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_S3_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_DYNAMODB_TABLE }}"

      - name: Terraform Plan
        if: steps.changed-paths.outputs.terraform == 'true'
        working-directory: ./terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: steps.changed-paths.outputs.terraform == 'true'
        working-directory: ./terraform
        run: terraform apply -input=false -auto-approve tfplan

      - name: Install Ansible
        run: |
          python3 -m pip install --quiet ansible

      - name: Run Ansible playbook
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: 'False'
        run: |
          mkdir -p /tmp/ansible
          printf '%s\n' "$SSH_PRIVATE_KEY" > /tmp/ansible/ssh_key
          chmod 600 /tmp/ansible/ssh_key
          IP=$(terraform -chdir=terraform output -raw web_instance_public_ip)
          cat > /tmp/ansible/inventory.ini <<'EOF'
          [webservers]
          ec2 ansible_host=$IP ansible_user=ec2-user ansible_private_key_file=/tmp/ansible/ssh_key
          EOF
          ansible-playbook -i /tmp/ansible/inventory.ini ansible/playbook.yml
